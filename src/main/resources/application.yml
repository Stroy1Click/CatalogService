spring:
  application:
    name: Catalog-Service
  profiles:
    active: dev
  config:
    import: application-prod.yml
  cache:
    type: redis
    cache-names: redis-cache
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  datasource:
    url: jdbc:postgresql://localhost:5432/stroy1click
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  flyway:
    url: jdbc:postgresql://localhost:5432/stroy1click
    user: postgres
    password: password
    baseline-on-migrate: true
  messages:
    basename: messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        acks: all
        enable.idempotence: true
        delivery.timeout.ms: 120000
        linger.ms: 0
        request.timeout.ms: 30000
        max.in.flight.requests.per.connection: 4
        spring.json.add.type.headers: true

otel:
  sdk:
    disabled: true

server:
  port: 7071

redisson:
  host: 127.0.0.1
  port: 6379
  username: default
  password: password

s3:
  access-key: b0a085fad6914c2abd49b762ee2263e2
  secret-key: 2bd487564bb54e9a8231bb3944108971
  region: ru-7
  bucket-name: stroy1click

resilience4j:
  ratelimiter:
    instances:
      storageLimiter:
        limitForPeriod: 30
        limitRefreshPeriod: 1s
      productLimiter:
        limitForPeriod: 30
        limitRefreshPeriod: 1s
      categoryLimiter:
        limit-for-period: 30
        limitRefreshPeriod: 1s
      subcategoryLimiter:
        limit-for-period: 30
        limitRefreshPeriod: 1s
      productTypeLimiter:
        limit-for-period: 30
        limitRefreshPeriod: 1s
      attributeLimiter:
        limit-for-period: 30
        limit-refresh-period: 1s
      productTypeAttributeLimiter:
        limit-for-period: 30
        limit-refresh-period: 1s
      productAttributeLimiter:
        limit-for-period: 30
        limit-refresh-period: 1s
  circuitbreaker:
    instances:
      outboxClient:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always